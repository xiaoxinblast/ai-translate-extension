<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>AI 翻译助手</title>
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1 class="title">AI 翻译助手</h1>
      <span class="version">v1.1</span>
    </header>

    <main class="popup-body">
      <!-- 翻译开关 -->
      <div class="control-group">
        <label class="toggle-label">
          <span>启用翻译</span>
          <input type="checkbox" id="translateToggle" class="toggle-input">
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- 语言选择 -->
      <div class="control-group">
        <label class="select-label" for="sourceLang">源语言</label>
        <select id="sourceLang" class="select-input">
          <option value="auto">自动检测</option>
          <option value="en">英语</option>
          <option value="zh">中文</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>

      <div class="control-group">
        <label class="select-label" for="targetLang">目标语言</label>
        <select id="targetLang" class="select-input">
          <option value="zh">中文</option>
          <option value="en">英语</option>
          <option value="ja">日语</option>
          <option value="ko">韩语</option>
          <option value="fr">法语</option>
          <option value="de">德语</option>
          <option value="es">西班牙语</option>
          <option value="ru">俄语</option>
        </select>
      </div>

      <!-- 显示模式 -->
      <div class="control-group">
        <label class="select-label" for="displayMode">显示模式</label>
        <select id="displayMode" class="select-input">
          <option value="bilingual">双语对照</option>
          <option value="translation-only">仅显示译文</option>
        </select>
      </div>

      <!-- 按钮 -->
      <button id="translateBtn" class="btn btn-primary">
        <span class="btn-icon">T</span>
        翻译当前页面
      </button>

      <div class="btn-row">
        <button id="logBtn" class="btn btn-small">📋 日志</button>
        <button id="snapshotBtn" class="btn btn-small">📸 快照</button>
      </div>

      <button id="restoreBtn" class="btn btn-secondary">
        <span class="btn-icon">R</span>
        恢复原文
      </button>

      <!-- 状态栏 -->
      <div id="statusBar" class="status-bar hidden">
        <span class="status-icon"></span>
        <span class="status-text"></span>
      </div>
    </main>

    <footer class="popup-footer">
      <button id="openOptions" class="link-btn">设置</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
