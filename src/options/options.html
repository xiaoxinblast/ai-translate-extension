<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="options.css">
  <title>AI 翻译助手 - 设置</title>
</head>
<body>
  <div class="options-container">
    <header class="options-header">
      <a href="#" id="backLink" class="back-link">&larr; 返回</a>
      <h1>设置</h1>
    </header>

    <main class="options-body">
      <!-- API Key 配置 -->
      <section class="setting-section">
        <h2 class="section-title">DeepSeek API Key</h2>
        <p class="section-desc">
          使用 DeepSeek 翻译需要 API Key，请前往
          <a href="https://platform.deepseek.com/api_keys" target="_blank" class="external-link">DeepSeek 开放平台</a>
          获取。
        </p>

        <div class="input-group">
          <input
            type="password"
            id="apiKey"
            class="input-field"
            placeholder="请输入你的 DeepSeek API Key"
            autocomplete="off"
          >
          <button id="toggleApiKey" class="toggle-visibility" title="显示/隐藏">👁</button>
        </div>

        <div class="action-row">
          <button id="saveApiKey" class="btn btn-primary">保存 API Key</button>
          <button id="testApiKey" class="btn btn-secondary">测试连接</button>
        </div>

        <p id="statusMessage" class="status-message"></p>
      </section>

      <!-- 翻译设置 -->
      <section class="setting-section">
        <h2 class="section-title">翻译引擎设置</h2>

        <div class="setting-item">
          <label class="setting-label" for="modelSelect">模型</label>
          <select id="modelSelect" class="select-input">
            <option value="deepseek-v4-flash">DeepSeek V4 Flash (快速)</option>
            <option value="deepseek-v4-pro">DeepSeek V4 Pro (高精度)</option>
          </select>
        </div>

        <div class="setting-item">
          <label class="setting-label" for="temperatureRange">
            翻译温度: <span id="temperatureValue">0.3</span>
          </label>
          <input
            type="range"
            id="temperatureRange"
            class="range-input"
            min="0"
            max="1"
            step="0.1"
            value="0.3"
          >
          <p class="setting-hint">较低温度使翻译更一致，较高温度使翻译更多样</p>
        </div>
      </section>

      <!-- 关于 -->
      <section class="setting-section">
        <h2 class="section-title">关于</h2>
        <div class="about-info">
          <p>AI 翻译助手 v1.0.0</p>
          <p>基于 DeepSeek AI 的网页翻译扩展</p>
          <p>支持 Microsoft Edge / Google Chrome</p>
        </div>
      </section>
    </main>
  </div>

  <script src="options.js"></script>
</body>
</html>
